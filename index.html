<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Manifesto Match</title>
<style>
:root{
  --ink:#1a1714;
  --paper:#f4ece0;
  --paper2:#ece1d0;
  --accent:#b5482e;
  --accent2:#3f6b54;
  --line:#cdbda6;
  --muted:#7a6e63;
  --gold:#c49a38;
  --white:#fffdf8;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  line-height:1.6;
  min-height:100vh;
}
.wrap{max-width:820px;margin:0 auto;padding:32px 20px 100px}

/* HEADER */
header{
  border-bottom:3px double var(--ink);
  padding-bottom:18px;margin-bottom:24px;
  display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;
}
.brand{display:flex;flex-direction:column;gap:4px}
.kicker{
  font-family:ui-monospace,"SF Mono",Menlo,monospace;
  font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--accent);
}
h1{font-size:clamp(30px,7vw,52px);line-height:.9;font-weight:900;letter-spacing:-.02em}
.tagline{font-style:italic;color:var(--muted);font-size:14px}
.hdr-right{display:flex;gap:8px;align-items:flex-end}
.btn{
  font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  padding:8px 14px;border:1.5px solid var(--ink);border-radius:2px;
  background:transparent;color:var(--ink);cursor:pointer;transition:all .15s;
}
.btn:hover{background:var(--ink);color:var(--paper)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#8a3320;border-color:#8a3320}
.btn.green{background:var(--accent2);border-color:var(--accent2);color:#fff}
.btn.green:hover{background:#2e5040}

/* PROGRESS PILLS */
.progress{display:flex;gap:6px;margin-bottom:28px;flex-wrap:wrap}
.step-pill{
  font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  padding:5px 12px;border:1px solid var(--line);border-radius:999px;
  color:var(--muted);cursor:default;transition:all .2s;
}
.step-pill.active{border-color:var(--accent);color:var(--accent);font-weight:700}
.step-pill.done{border-color:var(--accent2);background:var(--accent2);color:#fff}

/* SCREEN */
.screen{display:none;animation:fadein .3s ease}
.screen.active{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* SECTION LABELS */
.section-label{
  font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.3em;text-transform:uppercase;
  color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:6px;margin-bottom:16px;
}
.section-label span{color:var(--accent);margin-right:8px}

/* WORD GRID */
.word-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:24px;
}
.word-chip{
  border:1.5px solid var(--line);border-radius:3px;padding:10px 12px;
  cursor:pointer;transition:all .15s;background:var(--white);
  font-size:14px;text-align:center;user-select:none;
}
.word-chip:hover{border-color:var(--accent);color:var(--accent)}
.word-chip.selected{border-color:var(--accent);background:var(--accent);color:#fff}
.word-count{font-family:ui-monospace,monospace;font-size:12px;color:var(--muted);margin-bottom:14px}
.word-count b{color:var(--accent)}

/* MANIFESTO ENTRIES */
.manifesto-list{display:flex;flex-direction:column;gap:14px;margin-bottom:24px}
.manifesto-entry{background:var(--white);border:1px solid var(--line);border-radius:3px;padding:16px}
.entry-word{
  font-weight:700;font-size:15px;letter-spacing:.03em;margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
}
.entry-word .dot{
  width:8px;height:8px;border-radius:50%;background:var(--accent);display:inline-block;flex-shrink:0;
}
.entry-word .cat-badge{
  font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--muted);border:1px solid var(--line);padding:2px 7px;border-radius:999px;margin-left:auto;
}
textarea.entry-text{
  width:100%;border:none;outline:none;resize:none;font-family:inherit;font-size:14px;
  color:var(--ink);background:transparent;line-height:1.5;min-height:56px;
  border-bottom:1px dashed var(--line);padding-bottom:6px;
}
textarea.entry-text::placeholder{color:var(--muted);font-style:italic}

/* PROFILE FORM */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:520px){.form-row{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:5px}
label.fl{font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted)}
input.fi,select.fi{
  border:1.5px solid var(--line);border-radius:2px;padding:9px 12px;
  font-family:inherit;font-size:14px;color:var(--ink);background:var(--white);
  outline:none;transition:border .15s;
}
input.fi:focus,select.fi:focus{border-color:var(--accent)}

/* CATEGORY CHECKBOXES */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:20px}
.cat-check{
  display:flex;align-items:center;gap:10px;border:1.5px solid var(--line);border-radius:3px;
  padding:10px 12px;cursor:pointer;transition:all .15s;background:var(--white);
  font-size:13px;user-select:none;
}
.cat-check:hover{border-color:var(--ink)}
.cat-check.on{border-color:var(--accent2);background:var(--accent2);color:#fff}
.cat-icon{font-size:18px;line-height:1;flex-shrink:0}

/* MATCHES */
.matches-intro{font-style:italic;color:var(--muted);font-size:14px;margin-bottom:20px;border-left:3px solid var(--gold);padding-left:12px}
.match-card{
  background:var(--white);border:1.5px solid var(--line);border-radius:4px;
  margin-bottom:16px;overflow:hidden;
}
.match-header{
  display:flex;align-items:center;gap:14px;padding:16px 18px 12px;
  border-bottom:1px solid var(--line);
}
.match-avatar{
  width:46px;height:46px;border-radius:50%;border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:20px;
  background:var(--paper2);flex-shrink:0;
}
.match-name{font-weight:700;font-size:17px;letter-spacing:.01em}
.match-meta{font-size:12px;color:var(--muted);font-family:ui-monospace,monospace}
.match-score{
  margin-left:auto;text-align:right;flex-shrink:0;
}
.score-pct{font-size:28px;font-weight:900;color:var(--accent2);line-height:1}
.score-label{font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.match-body{padding:14px 18px}
.match-cats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.cat-pill{
  font-family:ui-monospace,monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  padding:4px 10px;border-radius:999px;border:1px solid var(--line);color:var(--muted);
}
.cat-pill.match{border-color:var(--accent2);color:var(--accent2);background:#f0f7f3}
.match-excerpt{font-size:13px;color:var(--muted);font-style:italic;line-height:1.5}
.match-words{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
.shared-word{
  font-size:12px;padding:3px 10px;border-radius:999px;background:var(--paper2);
  border:1px solid var(--line);font-family:ui-monospace,monospace;
}

/* CHAT */
.chat-wrap{
  border:1.5px solid var(--line);border-radius:4px;background:var(--white);margin-bottom:20px;
  display:flex;flex-direction:column;height:360px;overflow:hidden;
}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:10px;align-items:flex-start}
.msg.me{flex-direction:row-reverse}
.msg-avatar{
  width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;background:var(--paper2);border:1px solid var(--line);
}
.msg.me .msg-avatar{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.msg-bubble{
  max-width:72%;padding:9px 13px;border-radius:3px;font-size:13px;line-height:1.5;
  border:1px solid var(--line);background:var(--paper);
}
.msg.me .msg-bubble{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.msg-name{font-family:ui-monospace,monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.msg.me .msg-name{text-align:right}
.chat-input-row{
  display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line);
}
.chat-input-row input{
  flex:1;border:1.5px solid var(--line);border-radius:2px;padding:8px 12px;
  font-family:inherit;font-size:13px;outline:none;background:var(--paper);
}
.chat-input-row input:focus{border-color:var(--accent)}

/* NAV BOTTOM */
.nav-bottom{
  display:flex;gap:10px;justify-content:space-between;margin-top:28px;
  border-top:1px solid var(--line);padding-top:20px;
}
.empty-state{
  text-align:center;padding:40px;color:var(--muted);font-style:italic;font-size:15px;
  border:1.5px dashed var(--line);border-radius:4px;
}

/* RESPONSIVE */
@media(max-width:600px){
  .match-header{flex-wrap:wrap}
  .match-score{margin-left:0}
  .hdr-right{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="brand">
    <span class="kicker">Human Connection</span>
    <h1>Manifesto<br>Match</h1>
    <span class="tagline">Write who you are. Find who fits.</span>
  </div>
  <div class="hdr-right">
    <button class="btn" onclick="resetAll()">↺ Start Over</button>
    <button class="btn" onclick="showScreen('matches')" id="see-matches-btn" style="display:none">See My Matches →</button>
  </div>
</header>

<div class="progress" id="progress"></div>

<!-- STEP 1: PICK WORDS -->
<div class="screen active" id="screen-words">
  <div class="section-label"><span>01</span> Choose your words — pick 10 to 20</div>
  <div class="word-count">Selected: <b id="word-count-num">0</b> / 20 &nbsp;·&nbsp; minimum 10</div>
  <div class="word-grid" id="word-grid"></div>
  <div class="nav-bottom">
    <span></span>
    <button class="btn primary" onclick="goToManifesto()">Write My Manifesto →</button>
  </div>
</div>

<!-- STEP 2: WRITE MANIFESTO -->
<div class="screen" id="screen-manifesto">
  <div class="section-label"><span>02</span> Define each word in 1–3 sentences — this is your manifesto</div>
  <div class="manifesto-list" id="manifesto-list"></div>
  <div class="nav-bottom">
    <button class="btn" onclick="showScreen('words')">← Back</button>
    <button class="btn primary" onclick="goToProfile()">Set My Profile →</button>
  </div>
</div>

<!-- STEP 3: PROFILE -->
<div class="screen" id="screen-profile">
  <div class="section-label"><span>03</span> About you</div>
  <div class="form-row">
    <div class="field">
      <label class="fl">Your name</label>
      <input class="fi" id="p-name" type="text" placeholder="First name or alias"/>
    </div>
    <div class="field">
      <label class="fl">Age</label>
      <input class="fi" id="p-age" type="number" min="18" max="99" placeholder="Your age"/>
    </div>
  </div>
  <div class="form-row">
    <div class="field">
      <label class="fl">City / Neighborhood</label>
      <input class="fi" id="p-city" type="text" placeholder="e.g. Seattle, Ballard"/>
    </div>
    <div class="field">
      <label class="fl">Age range open to</label>
      <div style="display:flex;gap:8px">
        <input class="fi" id="p-agemin" type="number" min="18" max="99" placeholder="Min" style="width:50%"/>
        <input class="fi" id="p-agemax" type="number" min="18" max="99" placeholder="Max" style="width:50%"/>
      </div>
    </div>
  </div>
  <div class="form-row">
    <div class="field">
      <label class="fl">Location openness</label>
      <select class="fi" id="p-locopen">
        <option value="same">Same city only</option>
        <option value="region">Same region / metro</option>
        <option value="anywhere" selected>Anywhere, I'll travel or move</option>
      </select>
    </div>
  </div>
  <div class="section-label" style="margin-top:20px"><span>04</span> What are you looking for?</div>
  <div class="cat-grid" id="cat-grid"></div>
  <div class="nav-bottom">
    <button class="btn" onclick="showScreen('manifesto')">← Back</button>
    <button class="btn primary" onclick="findMatches()">Find My Matches →</button>
  </div>
</div>

<!-- STEP 4: MATCHES -->
<div class="screen" id="screen-matches">
  <div class="section-label"><span>05</span> Your matches</div>
  <p class="matches-intro" id="matches-intro"></p>
  <div id="matches-list"></div>
  <div class="nav-bottom">
    <button class="btn" onclick="showScreen('profile')">← Refine Profile</button>
    <button class="btn green" onclick="resetAll()">Start Fresh</button>
  </div>
</div>

<!-- STEP 5: CHAT -->
<div class="screen" id="screen-chat">
  <div class="section-label"><span>06</span> Message — <span id="chat-title" style="color:var(--ink);letter-spacing:0;text-transform:none;font-size:13px"></span></div>
  <div class="chat-wrap">
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="Write a message..." onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="btn primary" onclick="sendMsg()">Send</button>
    </div>
  </div>
  <div class="nav-bottom">
    <button class="btn" onclick="showScreen('matches')">← All Matches</button>
  </div>
</div>

</div><!-- /wrap -->

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────

const WORDS = [
  {w:"Freedom",cat:"ideas"},{w:"Roots",cat:"housing"},{w:"Risk",cat:"building"},
  {w:"Slowness",cat:"activities"},{w:"Depth",cat:"love"},{w:"Wonder",cat:"ideas"},
  {w:"Loyalty",cat:"love"},{w:"Craft",cat:"building"},{w:"Solitude",cat:"activities"},
  {w:"Abundance",cat:"housing"},{w:"Tender",cat:"love"},{w:"Play",cat:"kids"},
  {w:"Legacy",cat:"kids"},{w:"Wild",cat:"activities"},{w:"Honest",cat:"love"},
  {w:"Grounded",cat:"housing"},{w:"Vision",cat:"building"},{w:"Simple",cat:"housing"},
  {w:"Bold",cat:"building"},{w:"Curious",cat:"ideas"},{w:"Joyful",cat:"activities"},
  {w:"Quiet",cat:"ideas"},{w:"Committed",cat:"love"},{w:"Community",cat:"friends"},
  {w:"Trust",cat:"friends"},{w:"Reciprocal",cat:"friends"},{w:"Adventurous",cat:"activities"},
  {w:"Home",cat:"housing"},{w:"Generative",cat:"ideas"},{w:"Nurturing",cat:"kids"},
];

const CATS = [
  {id:"love",icon:"❤️",label:"Love"},
  {id:"kids",icon:"🌱",label:"Kids & Family"},
  {id:"building",icon:"🔨",label:"Building Things"},
  {id:"housing",icon:"🏠",label:"Home & Housing"},
  {id:"friends",icon:"🤝",label:"Deep Friendship"},
  {id:"activities",icon:"🚴",label:"Activities & Life"},
  {id:"ideas",icon:"💡",label:"Ideas & Projects"},
];

const SEED_PROFILES = [
  {
    name:"Marta", age:34, city:"Portland, OR", avatar:"🌿",
    ageMin:28, ageMax:45, locOpen:"region",
    seeking:["love","ideas","friends"],
    words:["Freedom","Depth","Loyal","Curious","Honest","Vision","Community","Tender","Wonder","Roots"],
    manifesto:{
      "Freedom":"I need the space to be unfinished, to still be becoming. I don't fit in boxes and I'll never ask you to either.",
      "Depth":"Surface level exhausts me. I want the 2am conversations and the silence that means something.",
      "Loyal":"I show up for the people I love, even when it's inconvenient. Especially then.",
      "Curious":"I think the best kind of love is one that keeps asking questions.",
      "Honest":"I'd rather say the hard thing than pretend. Kindly, but directly.",
      "Vision":"I'm always building something toward a life I actually want.",
      "Community":"The people around me are not a backdrop. They're the whole point.",
      "Tender":"Strength and softness aren't opposites.",
      "Wonder":"I still get excited about things. That's not going away.",
      "Roots":"I want to belong somewhere deeply, not everywhere shallowly.",
    }
  },
  {
    name:"Dev", age:41, city:"Seattle, WA", avatar:"🛠",
    ageMin:30, ageMax:50, locOpen:"region",
    seeking:["building","ideas","housing"],
    words:["Craft","Bold","Vision","Grounded","Home","Generative","Simple","Risk","Committed","Wild"],
    manifesto:{
      "Craft":"I make things with my hands and mind. The process is sacred to me, not just the result.",
      "Bold":"I'd rather try something strange and fail than do the safe thing and feel nothing.",
      "Vision":"I see what something could be before it exists. I need people who can see it too.",
      "Grounded":"I want a life that has weight — real place, real work, real relationships.",
      "Home":"I've spent years drifting. I'm building a home now and I take that seriously.",
      "Generative":"I want to create more value than I consume. In every direction.",
      "Simple":"Clarity over accumulation. I'm simplifying everything.",
      "Risk":"The best things I've done scared me first.",
      "Committed":"When I'm in, I'm in. I don't half-try.",
      "Wild":"I haven't domesticated my sense of possibility. I won't.",
    }
  },
  {
    name:"Solène", age:29, city:"Bellingham, WA", avatar:"✨",
    ageMin:25, ageMax:42, locOpen:"anywhere",
    seeking:["love","kids","activities","friends"],
    words:["Play","Nurturing","Wild","Joyful","Trust","Tender","Adventurous","Reciprocal","Legacy","Depth"],
    manifesto:{
      "Play":"I take joy seriously. It's not a waste of time, it's how I stay alive.",
      "Nurturing":"Caring for living things — kids, plants, people — is how I understand love.",
      "Wild":"I need to be outside. Not occasionally. Regularly and thoroughly.",
      "Joyful":"I'm suspicious of suffering as a virtue. I want a life that laughs.",
      "Trust":"I build it slowly and I keep it carefully.",
      "Tender":"I want to be gentle with myself and others without being fragile.",
      "Adventurous":"New places, new ways, new perspectives. Yes, always.",
      "Reciprocal":"I give a lot. I need someone who gives back.",
      "Legacy":"Someday I want to have made things that outlast me.",
      "Depth":"Connection at the surface level leaves me lonely.",
    }
  },
  {
    name:"Kwame", age:38, city:"Tacoma, WA", avatar:"🌍",
    ageMin:28, ageMax:50, locOpen:"anywhere",
    seeking:["ideas","community","friends","building"],
    words:["Community","Generative","Honest","Bold","Freedom","Vision","Curious","Committed","Craft","Wonder"],
    manifesto:{
      "Community":"I believe the individual life is made meaningful through collective action.",
      "Generative":"I want to build organizations, spaces, ideas that outlive their origin moment.",
      "Honest":"I can handle the truth. I prefer it. Always.",
      "Bold":"Small thinking is a choice. I refuse it.",
      "Freedom":"Not freedom from responsibility — freedom to shape the life I actually want.",
      "Vision":"I'm working toward something real and I need people who can see it and build with me.",
      "Curious":"I ask more questions than most people are comfortable with.",
      "Committed":"My word matters to me. When I say I'll do something, I do it.",
      "Craft":"The quality of the work reflects the quality of my thinking.",
      "Wonder":"The world is genuinely strange and beautiful. I'm still amazed by that.",
    }
  },
];

// ── STATE ─────────────────────────────────────────────────────────────────────

let selectedWords = new Set();
let manifesto = {};
let profile = {};
let seeking = new Set();
let matches = [];
let activeChat = null;
let chatHistory = {}; // by profile name

// ── INIT ──────────────────────────────────────────────────────────────────────

function init(){
  // Word grid
  const grid = document.getElementById('word-grid');
  grid.innerHTML = '';
  WORDS.forEach(({w,cat})=>{
    const el = document.createElement('div');
    el.className = 'word-chip' + (selectedWords.has(w)?' selected':'');
    el.textContent = w;
    el.onclick = ()=>toggleWord(w,el);
    grid.appendChild(el);
  });

  // Cat grid
  const cgrid = document.getElementById('cat-grid');
  cgrid.innerHTML = '';
  CATS.forEach(({id,icon,label})=>{
    const el = document.createElement('div');
    el.className = 'cat-check' + (seeking.has(id)?' on':'');
    el.innerHTML = `<span class="cat-icon">${icon}</span>${label}`;
    el.onclick = ()=>toggleCat(id,el);
    cgrid.appendChild(el);
  });

  updateProgress();
  updateWordCount();
}

function updateProgress(){
  const steps = [
    {id:'words',label:'Words'},
    {id:'manifesto',label:'Manifesto'},
    {id:'profile',label:'Profile'},
    {id:'matches',label:'Matches'},
  ];
  const current = document.querySelector('.screen.active')?.id.replace('screen-','') || 'words';
  const order = steps.map(s=>s.id);
  const currentIdx = order.indexOf(current);

  const el = document.getElementById('progress');
  el.innerHTML = steps.map(({id,label},i)=>{
    let cls = 'step-pill';
    if(i < currentIdx) cls += ' done';
    else if(id === current) cls += ' active';
    return `<span class="${cls}">${i<currentIdx?'✓ ':''}${label}</span>`;
  }).join('');
}

// ── WORDS ─────────────────────────────────────────────────────────────────────

function toggleWord(w, el){
  if(selectedWords.has(w)){
    selectedWords.delete(w);
    el.classList.remove('selected');
  } else {
    if(selectedWords.size >= 20){ alert('Max 20 words.'); return; }
    selectedWords.add(w);
    el.classList.add('selected');
  }
  updateWordCount();
}

function updateWordCount(){
  document.getElementById('word-count-num').textContent = selectedWords.size;
}

function goToManifesto(){
  if(selectedWords.size < 10){ alert('Please pick at least 10 words.'); return; }
  renderManifesto();
  showScreen('manifesto');
}

// ── MANIFESTO ─────────────────────────────────────────────────────────────────

function renderManifesto(){
  const list = document.getElementById('manifesto-list');
  list.innerHTML = '';
  selectedWords.forEach(w=>{
    const wordData = WORDS.find(x=>x.w===w);
    const div = document.createElement('div');
    div.className = 'manifesto-entry';
    div.innerHTML = `
      <div class="entry-word">
        <span class="dot"></span>${w}
        <span class="cat-badge">${wordData?.cat||''}</span>
      </div>
      <textarea class="entry-text" placeholder="What does "${w}" mean to you — in your own words…" rows="2">${manifesto[w]||''}</textarea>
    `;
    div.querySelector('textarea').oninput = (e)=>{ manifesto[w] = e.target.value; };
    list.appendChild(div);
  });
}

// ── PROFILE ───────────────────────────────────────────────────────────────────

function toggleCat(id, el){
  if(seeking.has(id)){ seeking.delete(id); el.classList.remove('on'); }
  else { seeking.add(id); el.classList.add('on'); }
}

function goToProfile(){
  const missing = [...selectedWords].filter(w=>!manifesto[w]?.trim());
  if(missing.length > 3){ alert(`Please fill in at least ${selectedWords.size-3} word definitions.`); return; }
  showScreen('profile');
}

// ── MATCHING ──────────────────────────────────────────────────────────────────

function wordScore(myWords, theirWords){
  const mine = new Set([...myWords].map(w=>w.toLowerCase()));
  const theirs = new Set(theirWords.map(w=>w.toLowerCase()));
  let shared = 0;
  mine.forEach(w=>{ if(theirs.has(w)) shared++; });
  return shared / Math.max(mine.size, theirs.size);
}

function catScore(myCats, theirSeeking){
  const a = new Set(myCats);
  const b = new Set(theirSeeking);
  let overlap = 0;
  a.forEach(c=>{ if(b.has(c)) overlap++; });
  return overlap / Math.max(a.size||1, b.size||1);
}

function ageOk(myAge, theirMin, theirMax, theirAge, myMin, myMax){
  return myAge >= theirMin && myAge <= theirMax && theirAge >= myMin && theirAge <= myMax;
}

function locOk(myOpen, theirOpen, myCity, theirCity){
  if(myOpen==='anywhere' || theirOpen==='anywhere') return true;
  const myState = myCity.split(',').pop()?.trim().toLowerCase();
  const theirState = theirCity.split(',').pop()?.trim().toLowerCase();
  if(myOpen==='region' && theirOpen==='region') return myState === theirState;
  return myCity.toLowerCase() === theirCity.toLowerCase();
}

function findMatches(){
  const name = document.getElementById('p-name').value.trim();
  const age = parseInt(document.getElementById('p-age').value)||0;
  const city = document.getElementById('p-city').value.trim();
  const ageMin = parseInt(document.getElementById('p-agemin').value)||18;
  const ageMax = parseInt(document.getElementById('p-agemax').value)||99;
  const locOpen = document.getElementById('p-locopen').value;

  if(!name||!age||!city){ alert('Please fill in your name, age, and city.'); return; }
  if(seeking.size===0){ alert('Pick at least one thing you\'re looking for.'); return; }

  profile = {name,age,city,ageMin,ageMax,locOpen,seeking:[...seeking],
    words:[...selectedWords], manifesto};

  const myCats = [...seeking];

  matches = SEED_PROFILES.map(p=>{
    const ws = wordScore([...selectedWords], p.words);
    const cs = catScore(myCats, p.seeking);
    const aok = ageOk(age, p.ageMin, p.ageMax, p.age, ageMin, ageMax) ? 1 : 0.3;
    const lok = locOk(locOpen, p.locOpen, city, p.city) ? 1 : 0.5;
    const score = Math.round((ws*0.5 + cs*0.35 + aok*0.1 + lok*0.05) * 100);
    const sharedWords = p.words.filter(w=>[...selectedWords].includes(w));
    const sharedCats = p.seeking.filter(c=>myCats.includes(c));
    return {...p, score, sharedWords, sharedCats};
  }).sort((a,b)=>b.score-a.score);

  renderMatches();
  showScreen('matches');
  document.getElementById('see-matches-btn').style.display='inline-block';
}

// ── RENDER MATCHES ────────────────────────────────────────────────────────────

function renderMatches(){
  const intro = document.getElementById('matches-intro');
  const list = document.getElementById('matches-list');
  intro.textContent = `Found ${matches.length} people whose manifesto resonates with yours, ${profile.name}. Top match: ${matches[0]?.name} at ${matches[0]?.score}% alignment.`;

  list.innerHTML = '';
  matches.forEach(m=>{
    const card = document.createElement('div');
    card.className = 'match-card';

    const sharedWordPills = m.sharedWords.slice(0,6).map(w=>
      `<span class="shared-word">${w}</span>`).join('');

    const catPills = CATS.map(({id,icon,label})=>{
      const isMatch = m.sharedCats.includes(id);
      const inProfile = m.seeking.includes(id);
      if(!inProfile) return '';
      return `<span class="cat-pill ${isMatch?'match':''}">${icon} ${label}</span>`;
    }).join('');

    // Pick an excerpt from their manifesto
    const excerptWord = m.sharedWords[0] || m.words[0];
    const excerpt = m.manifesto[excerptWord] || '';

    card.innerHTML = `
      <div class="match-header">
        <div class="match-avatar">${m.avatar}</div>
        <div>
          <div class="match-name">${m.name}</div>
          <div class="match-meta">${m.age} · ${m.city}</div>
        </div>
        <div class="match-score">
          <div class="score-pct">${m.score}%</div>
          <div class="score-label">aligned</div>
        </div>
      </div>
      <div class="match-body">
        <div class="match-cats">${catPills}</div>
        ${excerpt ? `<div class="match-excerpt">"${excerpt}"<br><span style="font-size:11px;font-family:ui-monospace,monospace;color:var(--muted)">— on ${excerptWord}</span></div>` : ''}
        <div class="match-words">${sharedWordPills}</div>
        <div style="margin-top:14px">
          <button class="btn green" onclick="openChat('${m.name}')">Message ${m.name} →</button>
        </div>
      </div>
    `;
    list.appendChild(card);
  });
}

// ── CHAT ──────────────────────────────────────────────────────────────────────

function openChat(name){
  activeChat = name;
  const match = matches.find(m=>m.name===name);
  document.getElementById('chat-title').textContent = `${match.avatar} ${name}, ${match.age} · ${match.city}`;
  if(!chatHistory[name]) chatHistory[name] = [
    {from:'them', text:`Hey ${profile.name||'there'} — I saw we share ${match.sharedWords.slice(0,2).join(' and ')}. That caught my attention.`}
  ];
  renderChat(name);
  showScreen('chat');
}

function renderChat(name){
  const match = matches.find(m=>m.name===name);
  const msgs = document.getElementById('chat-messages');
  msgs.innerHTML = '';
  (chatHistory[name]||[]).forEach(msg=>{
    const me = msg.from === 'me';
    const div = document.createElement('div');
    div.className = `msg ${me?'me':''}`;
    div.innerHTML = `
      <div class="msg-avatar">${me ? (profile.name?profile.name[0]:'Y') : match.avatar}</div>
      <div>
        <div class="msg-name">${me ? (profile.name||'You') : match.name}</div>
        <div class="msg-bubble">${msg.text}</div>
      </div>
    `;
    msgs.appendChild(div);
  });
  msgs.scrollTop = msgs.scrollHeight;
}

function sendMsg(){
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text||!activeChat) return;
  input.value = '';
  chatHistory[activeChat].push({from:'me',text});
  renderChat(activeChat);

  // Simple reply after delay
  setTimeout(()=>{
    const match = matches.find(m=>m.name===activeChat);
    const replies = [
      `That resonates — especially the part about ${match.sharedWords[Math.floor(Math.random()*match.sharedWords.length)]||'that'}.`,
      `I've been thinking about something similar lately.`,
      `Tell me more — what does that look like in practice for you?`,
      `Honestly, yes. I don't meet many people who think this way.`,
      `That's a lot of what I'm trying to figure out too.`,
      `I appreciate you saying that directly. I like directness.`,
    ];
    const reply = replies[Math.floor(Math.random()*replies.length)];
    chatHistory[activeChat].push({from:'them',text:reply});
    renderChat(activeChat);
  }, 900 + Math.random()*600);
}

// ── NAV ───────────────────────────────────────────────────────────────────────

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  updateProgress();
  window.scrollTo(0,0);
}

function resetAll(){
  selectedWords = new Set();
  manifesto = {};
  profile = {};
  seeking = new Set();
  matches = [];
  activeChat = null;
  chatHistory = {};
  document.getElementById('p-name').value='';
  document.getElementById('p-age').value='';
  document.getElementById('p-city').value='';
  document.getElementById('p-agemin').value='';
  document.getElementById('p-agemax').value='';
  document.getElementById('see-matches-btn').style.display='none';
  init();
  showScreen('words');
}

init();
</script>
